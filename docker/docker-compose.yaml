version: "3.9"

services:
  # ── Qdrant Vector Store ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medrag_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: medrag_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - qdrant
    restart: unless-stopped

  # ── Streamlit UI ────────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: medrag_ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
